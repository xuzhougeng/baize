name: macos-app

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build-app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set build cache env
        run: |
          echo "GOCACHE=$RUNNER_TEMP/go-build" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/go-build"

      - name: Test
        run: go test ./cmd/myclaw-desktop ./internal/...

      - name: Build signed and notarized DMG
        env:
          MACOS_BUILD_PLATFORM: darwin/arm64
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.${GITHUB_RUN_NUMBER}"
          fi
          ./scripts/package-desktop-macos.sh "${version}"

      - name: Verify notarized output
        run: |
          APP_PATH="cmd/myclaw-desktop/build/bin/myclaw-desktop.app"
          DMG_PATH="$(find dist -maxdepth 1 -name 'myclaw-desktop-macos-*.dmg' | head -n 1)"
          if [ ! -d "${APP_PATH}" ]; then
            ls -R cmd/myclaw-desktop/build
            echo "Error: .app bundle was not generated."
            exit 1
          fi
          if [ -z "${DMG_PATH}" ] || [ ! -f "${DMG_PATH}" ]; then
            ls -R dist
            echo "Error: DMG was not generated."
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          xcrun stapler validate "${APP_PATH}"
          xcrun stapler validate "${DMG_PATH}"
          ls -lh "${APP_PATH}" "${DMG_PATH}"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: myclaw-desktop-macos-arm64
          path: |
            cmd/myclaw-desktop/build/bin/myclaw-desktop.app
            dist/myclaw-desktop-macos-*.dmg
          if-no-files-found: error
          retention-days: 14
