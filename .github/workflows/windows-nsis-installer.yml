name: windows-nsis-installer

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*.*"

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Wails CLI
        shell: powershell
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Add Go bin to PATH
        shell: powershell
        run: |
          $gobin = Join-Path (go env GOPATH) "bin"
          $gobin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y

      - name: Add NSIS to PATH
        shell: powershell
        run: |
          $nsis = Join-Path ${env:ProgramFiles(x86)} "NSIS"
          $makensis = Join-Path $nsis "makensis.exe"
          if (!(Test-Path $makensis)) {
            throw "makensis.exe not found at $makensis"
          }
          $nsis | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Test
        shell: powershell
        run: go test ./cmd/myclaw-desktop ./internal/...

      - name: Build desktop installer
        shell: powershell
        working-directory: cmd/myclaw-desktop
        run: |
          wails build `
            -platform windows/amd64 `
            -o myclaw-desktop-amd64.exe `
            -nsis `
            -webview2 download `
            -m `
            -s

      - name: Verify installer output
        shell: powershell
        run: |
          $installers = Get-ChildItem -Path cmd/myclaw-desktop/build/bin -Filter *-installer.exe -File
          if (-not $installers) {
            Get-ChildItem -Path cmd/myclaw-desktop/build -Recurse | Select-Object FullName
            throw "NSIS installer was not generated."
          }
          $installers | Select-Object FullName, Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: myclaw-desktop-windows-amd64
          path: cmd/myclaw-desktop/build/bin/*-installer.exe
          if-no-files-found: error
          retention-days: 14
